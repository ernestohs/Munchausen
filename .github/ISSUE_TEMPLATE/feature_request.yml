name: Feature request
description: Suggest an idea for Munchausen
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: A sketch of how you would like it to look.
      render: csharp
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they fall short.
