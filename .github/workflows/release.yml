name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write          # OIDC token for nuget.org trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      # MinVer reads the published release's tag (this commit is the tag commit) and
      # stamps the exact version. No manual -p:Version plumbing needed.
      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Pack
        run: >
          dotnet pack src/Munchausen/Munchausen.csproj --no-build --configuration Release
          --output artifacts

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --skip-duplicate

      # Trusted Publishing: exchange the OIDC token for a short-lived nuget.org
      # API key (valid 1 hour). Requested right before push so it can't expire.
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg" "artifacts/*.snupkg"
          --source "https://api.nuget.org/v3/index.json"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --skip-duplicate

      - name: Attach packages to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" artifacts/*.nupkg artifacts/*.snupkg --clobber
